<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedBoost</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: #0A0F1C;
      color: #F8FAFC;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #3B82F6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .content {
      padding: 16px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
    }

    .status-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot.green {
      background: #22C55E;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
    }

    .dot.red {
      background: #EF4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
    }

    .dot.yellow {
      background: #EAB308;
      box-shadow: 0 0 8px rgba(234, 179, 8, 0.4);
    }

    .task-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .task-info .label {
      color: rgba(59, 130, 246, 0.8);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3B82F6;
      color: white;
    }

    .btn-primary:hover {
      background: #60A5FA;
    }

    .btn-outline {
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 8px;
    }

    .input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: #F8FAFC;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .login-prompt {
      text-align: center;
      padding: 24px 16px;
    }

    .login-prompt p {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 16px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <h1>LinkedBoost</h1>
  </div>

  <div class="content" id="app">
    <!-- Content injected by popup.js -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
